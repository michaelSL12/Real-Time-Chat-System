# Alembic configuration file.

[alembic]
# Path to migration scripts.
script_location = %(here)s/alembic

# Prepend the project root to sys.path.
prepend_sys_path = .

# Use the operating system path separator when parsing path lists.
path_separator = os

# IMPORTANT:
# Leave this blank.
# The real database URL is injected dynamically from alembic/env.py
# using the application's settings, which allows local, Docker, and test
# environments to use different databases without editing this file.
sqlalchemy.url = 

[post_write_hooks]
# Optional hooks for formatting or linting new migration files.
# Example configurations for black and ruff are left commented out below.

# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S